<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a1a">
    <title>MH-Games | ネオンゲームコレクション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="logo-container">
                <h1 class="logo neon-text">MH-Games</h1>
                <p class="tagline">ネオンゲームコレクション</p>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <span class="stat-icon">🎮</span>
                    <span class="stat-value" id="game-count">0</span>
                    <span class="stat-label">游戏</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="game-grid" id="game-grid"></div>

            <div class="pagination" id="pagination"></div>
        </main>

        <footer class="footer">
            <div class="footer-content">
                <p class="copyright">© 2026 MH-Games</p>
            </div>
        </footer>

        <div class="particles" id="particles"></div>
    </div>

    <script>
        const GAMES_PER_PAGE = 6;
        let allGames = [];
        let currentPage = 1;

        async function loadGames() {
            try {
                const response = await fetch('games.json');
                allGames = await response.json();
                
                const countEl = document.getElementById('game-count');
                countEl.textContent = allGames.length;
                
                renderPage(1);
            } catch (error) {
                console.error('加载游戏列表失败:', error);
            }
        }

        function getTotalPages() {
            return Math.ceil(allGames.length / GAMES_PER_PAGE);
        }

        function renderPage(page) {
            currentPage = page;
            
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            
            const start = (page - 1) * GAMES_PER_PAGE;
            const end = start + GAMES_PER_PAGE;
            const pageGames = allGames.slice(start, end);

            pageGames.forEach(game => {
                const card = createGameCard(game);
                grid.appendChild(card);
            });

            renderPagination();
            initCardAnimations();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = getTotalPages();

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';

            html += `<button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" 
                      onclick="${currentPage > 1 ? `renderPage(${currentPage - 1})` : ''}" 
                      ${currentPage === 1 ? 'disabled' : ''}>◀ 前一页</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="page-num ${i === currentPage ? 'active' : ''}" 
                              onclick="renderPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span class="page-dots">...</span>`;
                }
            }

            html += `<button class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" 
                      onclick="${currentPage < totalPages ? `renderPage(${currentPage + 1})` : ''}" 
                      ${currentPage === totalPages ? 'disabled' : ''}>下一页 ▶</button>`;

            container.innerHTML = html;
        }

        function createGameCard(game) {
            const card = document.createElement('a');
            card.href = `${game.id}/index.html`;
            card.className = 'game-card';
            card.dataset.game = game.id;
            card.style.backgroundImage = `url('images/${game.id}-bg.png')`;

            card.innerHTML = `
                <div class="card-overlay"></div>
                <div class="card-glow"></div>
                <div class="card-content">
                    <div class="game-icon">
                        <img src="images/${game.id}-logo.png" alt="${game.name}">
                    </div>
                    <h3 class="game-title">${game.name}</h3>
                    <p class="game-subtitle">${game.nameEn}</p>
                    <div class="game-tags">
                        ${game.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="play-btn">
                        <span>▶ PLAY</span>
                    </div>
                </div>
            `;
            
            const img = card.querySelector('img');
            if (img) {
                img.onerror = function() {
                    const gameIcon = this.parentElement;
                    gameIcon.innerHTML = `<span style="font-size:40px">${game.icon}</span>`;
                };
            }
            
            return card;
        }

        function initCardAnimations() {
            const cards = document.querySelectorAll('.game-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 80);

                card.addEventListener('mouseenter', () => {
                    card.style.transform = 'translateY(-8px) scale(1.02)';
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'translateY(0) scale(1)';
                });
            });
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (3 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadGames();
            createParticles();
        });
    </script>
</body>
</html>
