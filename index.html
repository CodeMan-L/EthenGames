<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨焕科技 - 游戏工作室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.loading-container{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#0a0a1a 0%,#000005 70%,#000 100%);z-index:9999;transition:opacity 1.2s cubic-bezier(.4,0,.2,1),visibility 1.2s ease}
.loading-container.fade-out{opacity:0;visibility:hidden}
.logo-wrapper{position:relative;margin-bottom:50px;width:85vw;max-width:700px}
@media(max-width:768px){.logo-wrapper{max-width:350px}}
@media(max-width:480px){.logo-wrapper{max-width:280px}.loading-bar-container{width:200px}}

.logo-svg{width:100%;height:auto;overflow:visible}

.mh-group,.games-group{opacity:0}

.hm-path{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:2.5;stroke:#fff}
.mh-path{stroke-width:2.8}
.games-path{stroke-width:2.2}

.loading-bar-container{width:320px;height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;opacity:0;position:relative}
.loading-bar-container::before{content:'';position:absolute;inset:-2px;background:linear-gradient(90deg,transparent,rgba(168,85,247,.3),transparent);border-radius:6px;animation:bar-scan 2s linear infinite}
@keyframes bar-scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.loading-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff6ec7,#a855f7,#3b82f6,#06b6d4);background-size:200% 100%;border-radius:4px;box-shadow:0 0 20px rgba(168,85,247,.5);position:relative}
.loading-bar::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:12px;height:12px;background:#fff;border-radius:50%;box-shadow:0 0 15px #fff,0 0 30px rgba(168,85,247,.8);animation:pulse-dot .8s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{transform:translateY(-50%) scale(1);opacity:1}50%{transform:translateY(-50%) scale(1.5);opacity:.7}}

.loading-text{margin-top:25px;font-size:13px;color:rgba(255,255,255,.5);letter-spacing:6px;text-transform:uppercase;opacity:0;font-weight:300}

.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;pointer-events:none;will-change:transform,opacity,box-shadow}

.bg-grid{position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(168,85,247,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(168,85,247,.03) 1px,transparent 1px);background-size:60px 60px;z-index:0;animation:grid-move 20s linear infinite;pointer-events:none}
@keyframes grid-move{0%{transform:perspective(500px) rotateX(60deg) translateY(0)}100%{transform:perspective(500px) rotateX(60deg) translateY(60px)}}

.aurora{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.4;overflow:hidden}
.aurora-beam{position:absolute;width:200%;height:200%;top:-50%;left:-50%;background:conic-gradient(from var(--angle,0deg),transparent 0deg,rgba(168,85,247,.08) 60deg,rgba(255,110,199,.06) 120deg,transparent 180deg,rgba(59,130,246,.08) 240deg,transparent 300deg,rgba(168,85,247,.08) 360deg);animation:aurora-rotate 15s linear infinite,aurora-pulse 8s ease-in-out infinite}
@keyframes aurora-rotate{to{--angle:360deg}}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes aurora-pulse{0%,100%{opacity:.3;transform:scale(1) rotate(0deg)}50%{opacity:.6;transform:scale(1.1) rotate(5deg)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="aurora">
  <div class="aurora-beam" style="--angle:0deg"></div>
  <div class="aurora-beam" style="--angle:120deg;animation-delay:-5s"></div>
  <div class="aurora-beam" style="--angle:240deg;animation-delay:-10s"></div>
</div>
<div class="particles" id="particles"></div>

<div class="loading-container" id="loadingContainer">
  <div class="logo-wrapper">
    <svg class="logo-svg" viewBox="0 0 750 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad-mh" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ff6ec7"/>
          <stop offset="50%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#3b82f6"/>
        </linearGradient>
        <linearGradient id="grad-games" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#f97316"/>
          <stop offset="33%" stop-color="#eab308"/>
          <stop offset="66%" stop-color="#22c55e"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
        <linearGradient id="grad-rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ff6ec7">
            <animate attributeName="stop-color" values="#ff6ec7;#a855f7;#3b82f6;#06b6d4;#ff6ec7" dur="3s" repeatCount="indefinite"/>
          </stop>
          <stop offset="50%" stop-color="#a855f7">
            <animate attributeName="stop-color" values="#a855f7;#3b82f6;#06b6d4;#ff6ec7;#a855f7" dur="3s" repeatCount="indefinite"/>
          </stop>
          <stop offset="100%" stop-color="#3b82f6">
            <animate attributeName="stop-color" values="#3b82f6;#06b6d4;#ff6ec7;#a855f7;#3b82f6" dur="3s" repeatCount="indefinite"/>
          </stop>
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b2"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b3"/>
          <feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">

          <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="b3"/>
          <feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

<script>
(function() {
  const mhGroup = document.getElementById('mhGroup');
  const gamesGroup = document.getElementById('gamesGroup');
  const mhPaths = document.querySelectorAll('.mh-path');
  const gamesPaths = document.querySelectorAll('.games-path');
  const allPaths = document.querySelectorAll('.hm-path');
  const loadingBarContainer = document.getElementById('loadingBarContainer');
  const loadingBar = document.getElementById('loadingBar');
  const loadingText = document.getElementById('loadingText');

  function getLength(path) {
    try { return path.getTotalLength(); } catch(e) { return 2000; }
  }

  mhPaths.forEach(p => {
    const len = getLength(p);
    p.style.strokeDasharray = len;
    p.style.strokeDashoffset = len;
  });
  gamesPaths.forEach(p => {
    const len = getLength(p);
    p.style.strokeDasharray = len;
    p.style.strokeDashoffset = len;
  });

  function animate(el, props, duration, easing, delay) {
    return new Promise(resolve => {
      setTimeout(() => {
        el.style.transition = `all ${duration}ms ${easing || 'cubic-bezier(0.4,0,0.2,1)'}`;
        Object.keys(props).forEach(k => el.style[k] = props[k]);
        setTimeout(resolve, duration);
      }, delay || 0);
    });
  }

  function animatePath(path, duration, delay) {
    return new Promise(resolve => {
      setTimeout(() => {
        path.style.transition = `stroke-dashoffset ${duration}ms cubic-bezier(0.65,0,0.35,1)`;
        path.style.strokeDashoffset = '0';
        setTimeout(resolve, duration);
      }, delay || 0);
    });
  }

  function flicker(el, times, interval) {
    return new Promise(resolve => {
      let count = 0;
      const timer = setInterval(() => {
        el.style.opacity = count % 2 === 0 ? '0.2' : '1';
        count++;
        if (count >= times) {
          clearInterval(timer);
          el.style.opacity = '1';
          resolve();
        }
      }, interval);
    });
  }

  async function runAnimation() {
    // ===== PHASE 1: MH 居中渐显 =====
    // MH outer: translate(20,7), MH width=215, center at 20+107.5=127.5
    // ViewBox center: 375. Need translateX(375-127.5)=247.5 on inner group
    mhGroup.style.opacity = '0';
    mhGroup.style.transform = 'translateX(247.5px) scale(0.9)';
    mhGroup.style.filter = 'blur(10px)';
    mhGroup.style.transition = 'none';

    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    await animate(mhGroup, { opacity: '1', filter: 'blur(0px)', transform: 'translateX(247.5px) scale(1)' }, 1000, 'cubic-bezier(0.16,1,0.3,1)', 300);

    // ===== PHASE 2: MH 线条描绘 =====
    await Promise.all([
      animatePath(mhPaths[0], 1200, 0),
      animatePath(mhPaths[1], 1200, 200)
    ]);

    // ===== PHASE 3: MH 向左移动到最终位置 =====
    await animate(mhGroup, { transform: 'translateX(0px) scale(1)' }, 800, 'cubic-bezier(0.16,1,0.3,1)', 0);

    // ===== PHASE 4: Games 从右快速滑入 + 闪烁 =====
    // Games outer: translate(275,6), Games width=428, right edge at 275+428=703
    // translateX(750) puts Games completely off-screen right
    gamesGroup.style.opacity = '0';
    gamesGroup.style.transform = 'translateX(750px)';
    gamesGroup.style.transition = 'none';

    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    await animate(gamesGroup, { opacity: '1', transform: 'translateX(0px)' }, 400, 'cubic-bezier(0.16,1,0.3,1)', 0);

    // Games 线条快速描绘
    await Promise.all([
      animatePath(gamesPaths[0], 500, 0),
      animatePath(gamesPaths[1], 500, 80),
      animatePath(gamesPaths[2], 500, 160),
      animatePath(gamesPaths[3], 500, 240),
      animatePath(gamesPaths[4], 500, 320)
    ]);

    // 闪烁效果
    await flicker(gamesGroup, 6, 60);

    // ===== PHASE 5: 整体渐变色 (4.2s - 5s) =====
    await new Promise(resolve => {
      mhPaths.forEach(p => {
        p.style.transition = 'stroke 0.6s ease, filter 0.6s ease';
        p.style.stroke = 'url(#grad-mh)';
        p.style.filter = 'url(#glow)';
      });
      gamesPaths.forEach(p => {
        p.style.transition = 'stroke 0.6s ease, filter 0.6s ease';
        p.style.stroke = 'url(#grad-games)';
        p.style.filter = 'url(#glow-strong)';
      });
      setTimeout(resolve, 800);
    });

    // ===== PHASE 6: 线条重构 - 消失再重绘 (5s - 6.5s) =====
    // 先让线条消失
    await new Promise(resolve => {
      allPaths.forEach(p => {
        p.style.transition = 'stroke-dashoffset 0.5s ease, opacity 0.3s ease';
        p.style.strokeDashoffset = getLength(p);
        p.style.opacity = '0.3';
      });
      setTimeout(resolve, 600);
    });

    // 重绘线条
    await new Promise(resolve => {
      allPaths.forEach((p, i) => {
        setTimeout(() => {
          p.style.transition = 'stroke-dashoffset 0.8s cubic-bezier(0.65,0,0.35,1), opacity 0.3s ease';
          p.style.strokeDashoffset = '0';
          p.style.opacity = '1';
        }, i * 80);
      });
      setTimeout(resolve, 1200);
    });

    // ===== PHASE 7: 变色 - 全部变成彩虹渐变 (6.5s - 7s) =====
    allPaths.forEach(p => {
      p.style.transition = 'stroke 0.5s ease';
      p.style.stroke = 'url(#grad-rainbow)';
      p.style.filter = 'url(#glow-strong)';
    });

    // ===== 显示加载条和文字 =====
    loadingBarContainer.style.transition = 'opacity 0.6s ease';
    loadingBarContainer.style.opacity = '1';
    loadingBar.style.transition = 'width 1.5s cubic-bezier(0.4,0,0.2,1)';
    loadingBar.style.width = '100%';

    loadingText.style.transition = 'opacity 0.6s ease';
    loadingText.style.opacity = '1';
  }

  runAnimation();

  // Particle System
  class ParticleSystem {
    constructor() {
      this.particles = [];
      this.mouseX = 0;
      this.mouseY = 0;
      this.container = document.getElementById('particles');
      this.isMobile = window.innerWidth < 768;
      this.lastFrame = 0;
      this.init();
    }
    init() {
      this.createParticles();
      this.bindEvents();
      this.animate();
    }
    createParticles() {
      const count = this.isMobile ? 30 : 50;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1.5;
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const hue = [320, 270, 220, 190, 280][Math.floor(Math.random() * 5)];
        const dur = Math.random() * 25 + 20;
        const delay = Math.random() * 15;
        p.style.cssText = `width:${size}px;height:${size}px;left:${x}%;top:${y}%;background:hsla(${hue},85%,65%,${Math.random()*0.4+0.2});animation:float-${i%4} ${dur}s ease-in-out ${delay}s infinite;box-shadow:0 0 ${size*2}px hsla(${hue},85%,65%,0.3)`;
        this.container.appendChild(p);
        this.particles.push({ el: p, x, y, size, hue, baseOpacity: Math.random()*0.4+0.2 });
      }
      const style = document.createElement('style');
      style.textContent = `
        @keyframes float-0{0%,100%{transform:translate(0,0) scale(1);opacity:.3}25%{transform:translate(25px,-40px) scale(1.3);opacity:.7}50%{transform:translate(-15px,-80px) scale(.9);opacity:.4}75%{transform:translate(30px,-120px) scale(1.2);opacity:.6}}
        @keyframes float-1{0%,100%{transform:translate(0,0) scale(1);opacity:.35}33%{transform:translate(-30px,-50px) scale(1.4);opacity:.8}66%{transform:translate(20px,-100px) scale(.8);opacity:.35}}
        @keyframes float-2{0%,100%{transform:translate(0,0) scale(.95);opacity:.4}50%{transform:translate(28px,-70px) scale(1.5);opacity:.9}}
        @keyframes float-3{0%,100%{transform:translate(0,0) scale(1);opacity:.3}25%{transform:translate(-20px,-35px) scale(1.2);opacity:.6}50%{transform:translate(15px,-65px) scale(.85);opacity:.35}75%{transform:translate(-25px,-95px) scale(1.3);opacity:.7}}
      `;
      document.head.appendChild(style);
    }
    bindEvents() {
      document.addEventListener('mousemove', e => { this.mouseX = e.clientX; this.mouseY = e.clientY; });
      document.addEventListener('touchmove', e => { if(e.touches.length>0){this.mouseX=e.touches[0].clientX;this.mouseY=e.touches[0].clientY;} });
    }
    animate() {
      const now = performance.now();
      if (now - this.lastFrame < 30) { requestAnimationFrame(() => this.animate()); return; }
      this.lastFrame = now;
      this.particles.forEach(p => {
        const dx = this.mouseX - (p.x/100*window.innerWidth);
        const dy = this.mouseY - (p.y/100*window.innerHeight);
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 180) {
          const force = (180-dist)/180;
          p.x -= (dx/dist)*force*1.2;
          p.y -= (dy/dist)*force*1.2;
          const scale = 1+force*0.6;
          const glow = p.size*3*(1+force);
          p.el.style.transform = `scale(${scale})`;
          p.el.style.background = `hsla(${p.hue},95%,70%,${p.baseOpacity+force*0.5})`;
          p.el.style.boxShadow = `0 0 ${glow}px hsla(${p.hue},95%,70%,${0.4+force*0.4})`;
        } else {
          p.el.style.transform = '';
          p.el.style.background = `hsla(${p.hue},85%,65%,${p.baseOpacity})`;
          p.el.style.boxShadow = `0 0 ${p.size*2}px hsla(${p.hue},85%,65%,0.2)`;
        }
        p.x = Math.max(0,Math.min(100,p.x));
        p.y = Math.max(0,Math.min(100,p.y));
        p.el.style.left = `${p.x}%`;
        p.el.style.top = `${p.y}%`;
      });
      requestAnimationFrame(() => this.animate());
    }
  }

  new ParticleSystem();

  setTimeout(() => {
    const c = document.getElementById('loadingContainer');
    if (!c.classList.contains('fade-out')) {
      c.classList.add('fade-out');
      setTimeout(() => { window.location.href = 'home.html'; }, 1200);
    }
  }, 9000);
})();
</script>
