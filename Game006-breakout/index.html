<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>霓虹弹球打砖块 | Neon Breakout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="home-screen" class="screen active">
            <div class="neon-title">
                <span class="neon-text">霓虹弹球</span>
                <span class="neon-sub">打砖块</span>
            </div>
            <div class="high-score-display">
                <span class="label">最高分</span>
                <span class="value" id="home-high-score">0</span>
            </div>
            <div class="menu-buttons">
                <button class="neon-btn start-btn" id="start-btn">
                    <span class="btn-text">开始游戏</span>
                    <span class="btn-glow"></span>
                </button>
                <button class="neon-btn levels-btn" id="levels-btn">
                    <span class="btn-text">关卡选择</span>
                    <span class="btn-glow"></span>
                </button>
                <button class="neon-btn settings-btn" id="settings-btn">
                    <span class="btn-text">设置</span>
                    <span class="btn-glow"></span>
                </button>
                <button class="neon-btn share-btn" id="share-btn">
                    <span class="btn-text">分享TikTok</span>
                    <span class="btn-glow"></span>
                </button>
            </div>
            <div class="sound-toggle">
                <button class="sound-btn" id="sound-toggle">
                    <span class="icon">🔊</span>
                </button>
            </div>
        </div>

        <div id="settings-screen" class="screen">
            <div class="screen-header">
                <h2 class="neon-header">设置</h2>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <span class="setting-label">音效</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="sfx-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">背景音乐</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="bgm-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">振动反馈</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="vibrate-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button class="neon-btn danger-btn" id="reset-btn">
                    <span class="btn-text">重置进度</span>
                </button>
            </div>
            <button class="neon-btn back-btn" id="settings-back-btn">
                <span class="btn-text">返回</span>
            </button>
        </div>

        <div id="levels-screen" class="screen">
            <div class="screen-header">
                <h2 class="neon-header">关卡选择</h2>
            </div>
            <div class="levels-grid" id="levels-grid"></div>
            <button class="neon-btn back-btn" id="levels-back-btn">
                <span class="btn-text">返回</span>
            </button>
        </div>

        <div id="game-hud" class="hud">
            <div class="hud-left">
                <span class="hud-item">
                    <span class="hud-label">关卡</span>
                    <span class="hud-value" id="level-display">1</span>
                </span>
            </div>
            <div class="hud-center">
                <span class="hud-item score-item">
                    <span class="hud-label">分数</span>
                    <span class="hud-value" id="score-display">0</span>
                </span>
            </div>
            <div class="hud-right">
                <span class="hud-item">
                    <span class="hud-label">生命</span>
                    <span class="hud-value" id="lives-display">❤️❤️❤️</span>
                </span>
            </div>
        </div>

        <div id="pause-btn" class="pause-button">⏸️</div>

        <div id="pause-modal" class="modal">
            <div class="modal-content">
                <h3 class="modal-title">游戏暂停</h3>
                <div class="modal-buttons">
                    <button class="neon-btn" id="resume-btn">继续</button>
                    <button class="neon-btn" id="restart-btn">重新开始</button>
                    <button class="neon-btn" id="quit-btn">退出</button>
                </div>
            </div>
        </div>

        <div id="game-over-modal" class="modal">
            <div class="modal-content">
                <h3 class="modal-title game-over-title">游戏结束</h3>
                <div class="final-score">
                    <span class="label">最终得分</span>
                    <span class="value" id="final-score">0</span>
                </div>
                <div class="modal-buttons">
                    <button class="neon-btn ad-btn" id="revive-ad-btn">
                        <span class="btn-text">📺 看广告复活</span>
                    </button>
                    <button class="neon-btn" id="retry-btn">重新开始</button>
                    <button class="neon-btn" id="home-btn">返回首页</button>
                </div>
            </div>
        </div>

        <div id="level-complete-modal" class="modal">
            <div class="modal-content">
                <h3 class="modal-title win-title">关卡完成!</h3>
                <div class="level-stats">
                    <div class="stat-item">
                        <span class="stat-label">得分</span>
                        <span class="stat-value" id="level-score">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">剩余生命</span>
                        <span class="stat-value" id="level-lives">0</span>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button class="neon-btn ad-btn" id="double-ad-btn">
                        <span class="btn-text">📺 看广告双倍</span>
                    </button>
                    <button class="neon-btn" id="next-level-btn">下一关</button>
                </div>
            </div>
        </div>

        <div id="chest-modal" class="modal">
            <div class="modal-content chest-content">
                <h3 class="modal-title chest-title">🎁 宝箱奖励</h3>
                <div class="chest-reward">
                    <span class="reward-value" id="chest-reward">+500</span>
                </div>
                <button class="neon-btn" id="chest-close-btn">领取</button>
            </div>
        </div>

        <div id="stuck-modal" class="modal">
            <div class="modal-content">
                <h3 class="modal-title">卡住了?</h3>
                <p class="modal-desc">看广告清除一行砖块</p>
                <div class="modal-buttons">
                    <button class="neon-btn ad-btn" id="bomb-ad-btn">
                        <span class="btn-text">📺 看广告炸砖</span>
                    </button>
                    <button class="neon-btn" id="stuck-cancel-btn">取消</button>
                </div>
            </div>
        </div>

        <div id="all-complete-modal" class="modal">
            <div class="modal-content">
                <h3 class="modal-title win-title">🏆 全部通关!</h3>
                <div class="final-score">
                    <span class="label">总分</span>
                    <span class="value" id="total-score">0</span>
                </div>
                <button class="neon-btn ad-btn" id="final-chest-btn">
                    <span class="btn-text">📺 看广告开宝箱</span>
                </button>
                <button class="neon-btn" id="play-again-btn">再玩一次</button>
            </div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="levels.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
