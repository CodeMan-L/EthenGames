<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Particle Blast</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #gameCanvas {
            display: block;
            touch-action: none;
            image-rendering: crisp-edges;
        }

        .game-info {
            position: absolute;
            top: calc(12px + var(--safe-top));
            left: calc(12px + var(--safe-left));
            color: #fff;
            font-size: clamp(12px, 3.5vw, 18px);
            z-index: 100;
            pointer-events: none;
        }
        .score { margin-bottom: 6px; }
        .combo {
            color: #ff0;
            font-size: clamp(16px, 4.5vw, 24px);
            font-weight: bold;
        }
        .lives {
            position: absolute;
            top: calc(12px + var(--safe-top));
            right: calc(12px + var(--safe-right));
            color: #fff;
            font-size: clamp(12px, 3.5vw, 18px);
            z-index: 100;
            pointer-events: none;
        }
        .heart {
            color: #ff6b6b;
            font-size: clamp(16px, 4.5vw, 24px);
            margin-right: 3px;
        }
        .volume-toggle {
            position: absolute;
            top: calc(12px + var(--safe-top));
            right: calc(80px + var(--safe-right));
            z-index: 100;
            background: none;
            border: none;
            font-size: clamp(20px, 5vw, 28px);
            cursor: pointer;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.5));
            transition: transform 0.2s;
            padding: 4px;
        }
        .volume-toggle:hover { transform: scale(1.2); }
        .game-close-btn {
            position: absolute;
            top: calc(48px + var(--safe-top));
            right: calc(12px + var(--safe-right));
            z-index: 100;
            background: rgba(255, 107, 107, 0.2);
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            font-size: clamp(14px, 3.5vw, 20px);
            width: clamp(28px, 7vw, 36px);
            height: clamp(28px, 7vw, 36px);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .game-close-btn:hover {
            background: #ff6b6b;
            color: #fff;
            transform: scale(1.1);
        }

        .home-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 245, 212, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(255, 107, 107, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(69, 183, 209, 0.05) 0%, transparent 60%),
                        linear-gradient(135deg, #0a0a1a 0%, #16213e 50%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .home-screen.fade-out {
            opacity: 0;
            transform: scale(1.05);
        }
        .home-screen::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: repeating-conic-gradient(
                from 0deg,
                transparent 0deg 8deg,
                rgba(255,255,255,0.01) 8deg 10deg
            );
            animation: rotateBg 120s linear infinite;
        }
        @keyframes rotateBg {
            to { transform: rotate(360deg); }
        }
        .home-screen::after {
            content: '';
            position: absolute;
            width: min(600px, 80vw); height: min(600px, 80vw);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,245,212,0.06) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        .game-title {
            font-size: clamp(24px, 7vw, 44px);
            font-weight: bold;
            color: #fff;
            margin-bottom: clamp(16px, 4vw, 30px);
            text-shadow: 0 0 30px rgba(0, 245, 212, 0.6), 0 0 60px rgba(0, 245, 212, 0.3);
            animation: pulse 2s infinite;
            z-index: 1;
            letter-spacing: clamp(1px, 0.5vw, 3px);
            max-width: min(90vw, 420px);
            text-align: center;
            overflow-wrap: break-word;
            word-break: break-word;
            line-height: 1.2;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .lang-select {
            display: flex;
            gap: clamp(8px, 2vw, 12px);
            margin-bottom: clamp(16px, 4vw, 28px);
            z-index: 1;
        }
        .lang-button {
            padding: clamp(6px, 1.5vw, 8px) clamp(14px, 3.5vw, 20px);
            font-size: clamp(12px, 3vw, 15px);
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .lang-button:hover {
            transform: scale(1.05);
            border-color: rgba(168, 85, 247, 0.5);
        }
        .lang-button.active {
            background: linear-gradient(45deg, #A855F7, #7C3AED);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .game-buttons {
            display: flex;
            gap: clamp(12px, 3vw, 24px);
            margin-bottom: clamp(20px, 5vw, 40px);
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-btn {
            padding: clamp(8px, 2.5vw, 14px) clamp(20px, 5vw, 40px);
            font-size: clamp(14px, 4vw, 20px);
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }
        .game-btn::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .game-btn:hover::before { opacity: 1; }
        .game-btn:hover { transform: scale(1.08); }
        .game-btn:active { transform: scale(0.96); }

        .btn-mining {
            background: linear-gradient(135deg, #00f5d4, #00b4d8);
            box-shadow: 0 0 25px rgba(0, 245, 212, 0.5), 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .btn-mining:hover { box-shadow: 0 0 40px rgba(0, 245, 212, 0.8), 0 4px 20px rgba(0, 0, 0, 0.3); }

        .btn-tiktok {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            box-shadow: 0 0 25px rgba(255, 107, 107, 0.5), 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .btn-tiktok:hover { box-shadow: 0 0 40px rgba(255, 107, 107, 0.8), 0 4px 20px rgba(0, 0, 0, 0.3); }

        .level-select {
            display: flex;
            gap: clamp(8px, 2vw, 12px);
            margin-bottom: clamp(20px, 5vw, 36px);
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
            max-width: min(420px, 90vw);
        }
        .level-button {
            padding: clamp(6px, 1.5vw, 8px) clamp(12px, 3vw, 18px);
            font-size: clamp(11px, 3vw, 14px);
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .level-button:hover {
            transform: scale(1.05);
            border-color: rgba(78, 205, 196, 0.5);
        }
        .level-button.active {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .game-over {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        .game-over.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .game-over h2 {
            font-size: clamp(22px, 6vw, 40px);
            color: #ff6b6b;
            margin-bottom: clamp(16px, 4vw, 30px);
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
            text-align: center;
            max-width: 90vw;
        }
        .final-score {
            font-size: clamp(16px, 5vw, 28px);
            color: #fff;
            margin-bottom: clamp(20px, 5vw, 40px);
            text-align: center;
        }
        .game-over-buttons {
            display: flex;
            gap: clamp(10px, 2.5vw, 16px);
            flex-wrap: wrap;
            justify-content: center;
        }
        .retry-button, .home-button {
            padding: clamp(10px, 3vw, 15px) clamp(20px, 5vw, 36px);
            font-size: clamp(13px, 3.5vw, 20px);
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .retry-button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }
        .retry-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
        }
        .home-button {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }
        .home-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.8);
        }

        .tiktok-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            backdrop-filter: blur(10px);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .tiktok-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .tiktok-screen h2 {
            font-size: clamp(20px, 6vw, 32px);
            color: #ff6b6b;
            margin-bottom: clamp(12px, 3vw, 20px);
            text-align: center;
            max-width: 90vw;
        }
        .tiktok-screen p {
            color: #ccc;
            font-size: clamp(14px, 3.5vw, 18px);
            margin-bottom: clamp(16px, 4vw, 30px);
            text-align: center;
            max-width: min(400px, 85vw);
            line-height: 1.6;
            padding: 0 16px;
        }
        .tiktok-close-btn {
            padding: clamp(8px, 2vw, 10px) clamp(20px, 5vw, 32px);
            font-size: clamp(13px, 3.5vw, 18px);
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
            transition: all 0.3s;
        }
        .tiktok-close-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.8);
        }

        .level-complete-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2500;
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .level-complete-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .level-complete-overlay h2 {
            font-size: clamp(22px, 6vw, 40px);
            color: #00f5d4;
            margin-bottom: clamp(12px, 3vw, 20px);
            text-shadow: 0 0 30px rgba(0, 245, 212, 0.6);
            text-align: center;
            max-width: 90vw;
        }
        .level-complete-overlay .level-score {
            font-size: clamp(16px, 5vw, 28px);
            color: #fff;
            margin-bottom: clamp(20px, 5vw, 36px);
            text-align: center;
        }
        .next-level-btn {
            padding: clamp(10px, 3vw, 15px) clamp(24px, 6vw, 44px);
            font-size: clamp(14px, 4vw, 22px);
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #00f5d4, #00b4d8);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 245, 212, 0.5);
            transition: all 0.3s;
        }
        .next-level-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 245, 212, 0.8);
        }
    </style>
</head>
<body>
    <div class="home-screen" id="homeScreen">
        <h1 class="game-title" data-i18n="title">Particle Blast</h1>
        <div class="lang-select">
            <button class="lang-button active" data-lang="en">English</button>
            <button class="lang-button" data-lang="ja">日本語</button>
        </div>
        <div class="level-select" id="levelSelect">
            <button class="level-button active" data-level="1">Lv.1</button>
            <button class="level-button" data-level="2">Lv.2</button>
            <button class="level-button" data-level="3">Lv.3</button>
            <button class="level-button" data-level="4">Lv.4</button>
            <button class="level-button" data-level="5">Lv.5</button>
        </div>
        <div class="game-buttons">
            <button class="game-btn btn-mining" id="startButton" data-i18n="startGame">Start</button>
            <button class="game-btn btn-tiktok" id="tiktokButton" data-i18n="shareTikTok">Share to TikTok</button>
        </div>
    </div>

    <div class="game-info" id="gameInfo" style="display:none;">
        <div class="score"><span data-i18n="score">Score</span>: <span id="score">0</span></div>
        <div class="combo"><span data-i18n="combo">Combo</span>: <span id="combo">0</span></div>
    </div>
    <div class="lives" id="livesContainer" style="display:none;">
        <span class="heart">❤</span>
        <span class="heart">❤</span>
        <span class="heart">❤</span>
    </div>
    <button class="volume-toggle" id="volumeToggle" title="Sound Toggle">🔊</button>
    <button class="game-close-btn" id="gameCloseBtn" style="display:none;" title="Close">✕</button>

    <canvas id="gameCanvas"></canvas>

    <div class="game-over" id="gameOver">
        <h2 data-i18n="gameOver">Game Over</h2>
        <div class="final-score"><span data-i18n="finalScore">Final Score</span>: <span id="finalScore">0</span></div>
        <div class="game-over-buttons">
            <button class="retry-button" id="retryButton" data-i18n="watchAdRevive">Watch Ad to Revive</button>
            <button class="home-button" id="homeButton" data-i18n="backToHome">Back to Home</button>
        </div>
    </div>

    <div class="level-complete-overlay" id="levelComplete">
        <h2 data-i18n="levelComplete">Level Complete!</h2>
        <div class="level-score"><span data-i18n="score">Score</span>: <span id="levelCompleteScore">0</span></div>
        <button class="next-level-btn" id="nextLevelBtn" data-i18n="nextLevel">Next Level</button>
    </div>

    <div class="tiktok-screen" id="tiktokScreen">
        <h2 data-i18n="shareTikTok">Share to TikTok</h2>
        <p data-i18n="tiktokDesc">Share your game score on TikTok and challenge your friends!</p>
        <div style="display:flex;flex-direction:column;gap:12px;align-items:center;">
            <a href="https://www.tiktok.com/" target="_blank" rel="noopener" class="tiktok-close-btn" style="text-decoration:none;" data-i18n="openTikTok">Open TikTok</a>
            <button class="tiktok-close-btn" id="tiktokCloseBtn" style="background:rgba(255,255,255,0.1);box-shadow:none;" data-i18n="back">Back</button>
        </div>
    </div>

    <script>
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); });
        document.addEventListener('dblclick', function(e) { e.preventDefault(); });
    </script>
    <script src="game.js"></script>
</body>
</html>
