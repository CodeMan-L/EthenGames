function vib(ms){if(cfg.vibOn&&navigator.vibrate)navigator.vibrate(ms);}
function clp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function dst(x1,y1,x2,y2){return Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1));}

function hsl2hex(h,s,l){
h=((h%360)+360)%360;s/=100;l/=100;var a=s*Math.min(l,1-l);
function f(n){var k=(n+h/30)%12;var c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*Math.max(0,Math.min(1,c))).toString(16).padStart(2,'0');}
return'#'+f(0)+f(8)+f(4);
}

function mkBall(x,y){return{x:x,y:y,vx:0,vy:0,r:12,hue:0,cp:0,active:false,trail:[]};}
function bCol(b){return hsl2hex(b.hue%360,80,60);}
function bGlow(b){return hsl2hex(b.hue%360,80,75);}

function updBall(b,d,g){
if(!b.active)return;
b.vy+=g*d;b.vx*=FRIC;b.vy*=FRIC;
var sp=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
if(sp>MAX_SPD){b.vx=(b.vx/sp)*MAX_SPD;b.vy=(b.vy/sp)*MAX_SPD;}
b.x+=b.vx*d;b.y+=b.vy*d;
b.cp+=sp*0.5*d;b.hue=b.cp;
var mt=cfg.qual===0?8:cfg.qual===1?15:25;
b.trail.unshift({x:b.x,y:b.y,h:b.hue,a:1});
if(b.trail.length>mt)b.trail.pop();
for(var i=0;i<b.trail.length;i++)b.trail[i].a=1-i/b.trail.length;
}

function drwBall(b){
if(cfg.qual>=1){for(var i=b.trail.length-1;i>=0;i--){var tr=b.trail[i],al=tr.a*0.5,r=b.r*tr.a;ctx.beginPath();ctx.arc(tr.x,tr.y,Math.max(1,r),0,Math.PI*2);ctx.fillStyle=hsl2hex(tr.h%360,80,60)+Math.floor(al*255).toString(16).padStart(2,'0');ctx.fill();}}
var gr=ctx.createRadialGradient(b.x-3,b.y-3,0,b.x,b.y,b.r);
gr.addColorStop(0,bGlow(b));gr.addColorStop(0.5,bCol(b));gr.addColorStop(1,hsl2hex(b.hue%360,80,40));
ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
if(cfg.qual>=2){ctx.beginPath();ctx.arc(b.x-3,b.y-3,b.r*0.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();}
}

function updTgt(t,d){t.pulse+=0.03*d;if(t.hf>0)t.hf-=0.05*d;}

function drwTgt(t){
if(!t.alive)return;
var c=TC[t.ci],pr=t.r+Math.sin(t.pulse)*3,fl=t.hf>0?t.hf:0;

function mkObs(x,y,w,h,a){return{x:x,y:y,w:w,h:h,a:a||0,hf:0};}

ctx.fillStyle=gr;ctx.beginPath();ctx.roundRect(-o.w/2,-o.h/2,o.w,o.h,o.h/2);ctx.fill();
if(cfg.qual>=2){ctx.strokeStyle='rgba('+(150+fl*105|0)+','+(180+fl*75|0)+',255,'+(0.5+fl*0.5).toFixed(2)+')';ctx.lineWidth=1.5;ctx.stroke();}

function mkWall(x1,y1,x2,y2){return{x1:x1,y1:y1,x2:x2,y2:y2,hf:0};}

function drwWall(w){

}

function mkPart(x,y,col,sm){var a=Math.random()*Math.PI*2,sp=(Math.random()*3+1)*(sm||1);return{x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col:col,r:Math.random()*3+1};}
function updPart(p,d){p.x+=p.vx*d;p.y+=p.vy*d;p.vy+=0.05*d;p.life-=0.03*d;p.r*=0.98;}
function drwPart(p){if(p.life<=0)return;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.5,p.r),0,Math.PI*2);ctx.fillStyle=p.col;ctx.globalAlpha=p.life;ctx.fill();ctx.globalAlpha=1;}

function mkFText(x,y,txt,col,isSc){return{x:x,y:y,txt:txt,col:col,life:1,vy:-2,isSc:isSc,sc:0};}
function updFText(f,d){f.y+=f.vy*d;f.vy*=0.98;f.life-=0.02*d;if(f.sc<1)f.sc=Math.min(1,f.sc+0.1*d);}
function drwFText(f){
if(f.life<=0)return;ctx.save();ctx.globalAlpha=f.life;ctx.translate(f.x,f.y);ctx.scale(f.sc,f.sc);
ctx.font=f.isSc?'bold 28px Arial':'bold 20px Arial';ctx.fillStyle=f.col;ctx.textAlign='center';ctx.textBaseline='middle';
if(f.isSc){ctx.shadowColor=f.col;ctx.shadowBlur=10;}

function mkFlash(x,y){return{x:x,y:y,life:1,r:8};}
function updFlash(f,d){f.life-=0.04*d;f.r+=4*d;}
function drwFlash(f){
if(f.life<=0)return;ctx.save();ctx.globalAlpha=f.life*0.9;

gr.addColorStop(0,'rgba(255,255,255,1)');gr.addColorStop(0.2,'rgba(255,255,240,0.7)');gr.addColorStop(0.5,'rgba(255,255,200,0.3)');gr.addColorStop(1,'rgba(255,255,255,0)');
ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();ctx.restore();
}

function spawnP(x,y,col,n,sm){for(var i=0;i<n;i++)parts.push(mkPart(x,y,col,sm));}

function loadLvl(idx){
curLvl=idx;var lv=LEVELS[idx];
score=0;lives=lv.lives;tgtScore=lv.tgt;
ball=mkBall(lv.lp.x,lv.lp.y);launchP={x:lv.lp.x,y:lv.lp.y};
ballLaunched=false;comboN=0;comboT=0;reviveOk=true;
parts=[];fTexts=[];flashes=[];tgts=[];obs=[];wls=[];
for(var i=0;i<lv.tgts.length;i++){var td=lv.tgts[i];tgts.push(mkTgt(td.x,td.y,td.r,td.ci));}
for(var i=0;i<lv.obs.length;i++){var od=lv.obs[i];obs.push(mkObs(od.x,od.y,od.w,od.h,od.a));}
for(var i=0;i<lv.wls.length;i++){var wd=lv.wls[i];wls.push(mkWall(wd.x1,wd.y1,wd.x2,wd.y2));}
gs=ST.PLAY;snd.startMus();
}

function cpOnSeg(px,py,x1,y1,x2,y2){
var dx=x2-x1,dy=y2-y1,ls=dx*dx+dy*dy;
if(ls===0)return{x:x1,y:y1};var t=clp(((px-x1)*dx+(py-y1)*dy)/ls,0,1);return{x:x1+t*dx,y:y1+t*dy};
}

function colBallWall(b,w){
var cp=cpOnSeg(b.x,b.y,w.x1,w.y1,w.x2,w.y2);
var dx=b.x-cp.x,dy=b.y-cp.y,d=Math.sqrt(dx*dx+dy*dy);
if(d<b.r&&d>0){
var nx=dx/d,ny=dy/d;b.x=cp.x+nx*b.r;b.y=cp.y+ny*b.r;
var dot=b.vx*nx+b.vy*ny;
b.vx=(b.vx-2*dot*nx)*BOUNCE;b.vy=(b.vy-2*dot*ny)*BOUNCE;
w.hf=1;snd.play('bounce');vib(10);spawnP(cp.x,cp.y,'rgba(150,180,255,0.8)',3,0.5);return true;
}return false;
}

function colBallObs(b,o){
var cos=Math.cos(-o.a),sin=Math.sin(-o.a),dx=b.x-o.x,dy=b.y-o.y;
var lx=dx*cos-dy*sin,ly=dx*sin+dy*cos;
var hw=o.w/2,hh=o.h/2,cx=clp(lx,-hw,hw),cy=clp(ly,-hh,hh);
var ddx=lx-cx,ddy=ly-cy,d=Math.sqrt(ddx*ddx+ddy*ddy);
if(d<b.r&&d>0){
var nlx=ddx/d,nly=ddy/d;lx=cx+nlx*b.r;ly=cy+nly*b.r;
var c2=Math.cos(o.a),s2=Math.sin(o.a);
b.x=o.x+lx*c2-ly*s2;b.y=o.y+lx*s2+ly*c2;
var vlx=b.vx*cos-b.vy*sin,vly=b.vx*sin+b.vy*cos;
var dot=vlx*nlx+vly*nly;
vlx=(vlx-2*dot*nlx)*OBS_BOUNCE;vly=(vly-2*dot*nly)*OBS_BOUNCE;
b.vx=vlx*c2-vly*s2;b.vy=vlx*s2+vly*c2;
o.hf=1;snd.play('bounce');vib(15);
var hx=o.x+cx*c2-cy*s2,hy=o.y+cx*s2+cy*c2;
spawnP(hx,hy,'rgba(100,200,255,0.8)',5,0.8);return true;
}return false;
}

function colBallTgt(b,tg){
if(!tg.alive)return false;
var dx=b.x-tg.x,dy=b.y-tg.y,d=Math.sqrt(dx*dx+dy*dy);
if(d<b.r+tg.r){
tg.alive=false;var c=TC[tg.ci],pts=c.pts;
var spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
var spdBonus=1+Math.floor(spd/MAX_SPD*0.5);
pts*=spdBonus;
comboN++;comboT=60;
if(comboN>1){pts=Math.floor(pts*(1+comboN*0.3));fTexts.push(mkFText(tg.x,tg.y-30,t('combo')+' x'+comboN,C.a3,false));}
if(comboN>5)comboN=5;
score+=pts;
spawnP(tg.x,tg.y,c.base,15,1.5);spawnP(tg.x,tg.y,'#ffffff',8,1.2);
flashes.push(mkFlash(tg.x,tg.y));
fTexts.push(mkFText(tg.x,tg.y,'+'+pts,c.glow,true));
snd.play('score');if(comboN>2)snd.play('combo');
vib(20);shakeAmt=5;return true;
}return false;
}

function updPhysics(d){
if(!ball)return;var lv=LEVELS[curLvl];
updBall(ball,d,lv.grav);
if(ball.active){
for(var i=0;i<wls.length;i++){colBallWall(ball,wls[i]);updWall(wls[i],d);}
for(var i=0;i<obs.length;i++){colBallObs(ball,obs[i]);updObs(obs[i],d);}
for(var i=0;i<tgts.length;i++){colBallTgt(ball,tgts[i]);updTgt(tgts[i],d);}
if(ball.x<ball.r){ball.x=ball.r;ball.vx=Math.abs(ball.vx)*BOUNCE;snd.play('bounce');}
if(ball.x>DESIGN_W-ball.r){ball.x=DESIGN_W-ball.r;ball.vx=-Math.abs(ball.vx)*BOUNCE;snd.play('bounce');}
if(ball.y<ball.r){ball.y=ball.r;ball.vy=Math.abs(ball.vy)*BOUNCE;snd.play('bounce');}
}
if(comboT>0){comboT-=d;if(comboT<=0)comboN=0;}
for(var i=parts.length-1;i>=0;i--){updPart(parts[i],d);if(parts[i].life<=0)parts.splice(i,1);}
for(var i=fTexts.length-1;i>=0;i--){updFText(fTexts[i],d);if(fTexts[i].life<=0)fTexts.splice(i,1);}
for(var i=flashes.length-1;i>=0;i--){updFlash(flashes[i],d);if(flashes[i].life<=0)flashes.splice(i,1);}
if(shakeAmt>0)shakeAmt*=0.9;
if(ball.active&&ball.y>DESIGN_H+50)ballLost();
var allDone=true;for(var i=0;i<tgts.length;i++){if(tgts[i].alive){allDone=false;break;}}
if(allDone||score>=tgtScore)lvlClear();
}

function ballLost(){
lives--;

else{ball=mkBall(launchP.x,launchP.y);ballLaunched=false;comboN=0;snd.play('fail');}
}

function drwGuide(){

ctx.beginPath();ctx.arc(ball.x+Math.cos(ang)*len,ball.y+Math.sin(ang)*len,6,0,Math.PI*2);ctx.fillStyle='rgba('+r+','+g+',100,0.5)';ctx.fill();
ctx.font='bold 18px Arial';ctx.fillStyle='rgba(255,255,255,0.8)';ctx.textAlign='center';ctx.fillText(Math.floor(pr*100)+'%',ball.x,ball.y-30);

var txt=t('aboutText'),ll=28,lines=[];for(var i=0;i<txt.length;i+=ll)lines.push(txt.substring(i,i+ll));
for(var i=0;i<lines.length;i++)ctx.fillText(lines[i],DESIGN_W/2,180+i*30);
drwBtn(DESIGN_W/2,DESIGN_H-100,200,50,t('back'),'#2d3436','#636e72');ctx.restore();
}

function drwOver(){
drwBg();drwGameArea();var ox=(W-DESIGN_W*scale)/2,oy=(H-DESIGN_H*scale)/2;
ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,DESIGN_W,DESIGN_H);
var tg=ctx.createLinearGradient(200,250,600,350);tg.addColorStop(0,C.a1);tg.addColorStop(1,C.dng1);
ctx.font='bold 48px Arial';ctx.fillStyle=tg;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t('gameOver'),DESIGN_W/2,300);
ctx.font='24px Arial';ctx.fillStyle=C.tx;ctx.fillText(t('finalScore')+': '+score,DESIGN_W/2,380);ctx.fillText(t('reachedLevel')+' '+(curLvl+1),DESIGN_W/2,420);
drwBtn(DESIGN_W/2,520,260,55,t('restart'),C.btn1,C.btn2);
drwBtn(DESIGN_W/2,600,260,55,t('backHome'),'#2d3436','#636e72');ctx.restore();
}

function drwClear(){
drwBg();drwGameArea();var ox=(W-DESIGN_W*scale)/2,oy=(H-DESIGN_H*scale)/2;
ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,DESIGN_W,DESIGN_H);
var bn=Math.sin(frameN*0.08)*5;
var tg=ctx.createLinearGradient(200,230,600,330);tg.addColorStop(0,C.a2);tg.addColorStop(0.5,C.a3);tg.addColorStop(1,C.suc1);
ctx.font='bold 48px Arial';ctx.fillStyle=tg;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t('levelComplete'),DESIGN_W/2,280+bn);
ctx.font='24px Arial';ctx.fillStyle=C.tx;ctx.fillText(t('scoreLabel')+': '+score,DESIGN_W/2,360);ctx.fillText(t('targetLabel')+': '+tgtScore,DESIGN_W/2,400);
var stars=score>=tgtScore*2?3:score>=tgtScore*1.5?2:1;
ctx.font='40px Arial';var ss='';for(var i=0;i<3;i++)ss+=i<stars?'\u2B50':'\u2606';ctx.fillText(ss,DESIGN_W/2,460);
if(curLvl<LEVELS.length-1)drwBtn(DESIGN_W/2,550,260,55,t('nextLevel'),C.suc1,C.suc2);
drwBtn(DESIGN_W/2,630,260,55,t('levelSelect'),'#2d3436','#636e72');
drwBtn(DESIGN_W/2,710,260,55,t('backHome'),'#2d3436','#636e72');ctx.restore();
}

function drwPause(){
drwBg();drwGameArea();var ox=(W-DESIGN_W*scale)/2,oy=(H-DESIGN_H*scale)/2;
ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,DESIGN_W,DESIGN_H);
ctx.font='bold 42px Arial';ctx.fillStyle=C.tx;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t('paused'),DESIGN_W/2,350);
drwBtn(DESIGN_W/2,460,260,55,t('continueGame'),C.suc1,C.suc2);
drwBtn(DESIGN_W/2,540,260,55,t('restart'),C.btn1,C.btn2);
drwBtn(DESIGN_W/2,620,260,55,t('backHome'),'#2d3436','#636e72');ctx.restore();
}

function drwRevive(){
drwBg();drwGameArea();var ox=(W-DESIGN_W*scale)/2,oy=(H-DESIGN_H*scale)/2;
ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,DESIGN_W,DESIGN_H);
if(adOn){
ctx.font='bold 36px Arial';ctx.fillStyle=C.a3;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t('watchingAd'),DESIGN_W/2,350);
var ap=adT/180;ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(DESIGN_W/2-100,400,200,10);
ctx.fillStyle=C.a2;ctx.fillRect(DESIGN_W/2-100,400,200*ap,10);
ctx.font='16px Arial';ctx.fillStyle=C.txD;ctx.fillText(t('pleaseWait')+' '+(3-Math.floor(adT/60))+t('seconds'),DESIGN_W/2,440);
}else{
ctx.font='bold 42px Arial';ctx.fillStyle=C.a1;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t('livesOut'),DESIGN_W/2,300);
ctx.font='20px Arial';ctx.fillStyle=C.tx;ctx.fillText(t('watchAdRevive'),DESIGN_W/2,370);
drwBtn(DESIGN_W/2,460,260,55,t('watchAd'),C.suc1,C.suc2);
drwBtn(DESIGN_W/2,540,260,55,t('giveUp'),C.dng1,C.dng2);
}
ctx.restore();
}

function onDown(e){
e.preventDefault();var rect=canvas.getBoundingClientRect();
var sx=e.clientX-rect.left,sy=e.clientY-rect.top,g=s2g(sx,sy),gx=g.x,gy=g.y;
snd.init();
if(gs===ST.HOME){
var by=550;
if(hitBtn(DESIGN_W/2,by,260,60,gx,gy)){snd.play('click');loadLvl(0);}
else if(hitBtn(DESIGN_W/2,by+90,260,55,gx,gy)){snd.play('click');gs=ST.LVL_SEL;}
else if(hitBtn(DESIGN_W/2,by+170,260,55,gx,gy)){snd.play('click');gs=ST.SET;}
else if(hitBtn(DESIGN_W/2,by+250,260,55,gx,gy)){snd.play('click');gs=ST.ABOUT;}
}else if(gs===ST.LVL_SEL){
for(var i=0;i<LEVELS.length;i++){var col=i%3,row=Math.floor(i/3),bx=150+col*250,by=220+row*200;if(gx>=bx-80&&gx<=bx+80&&gy>=by-60&&gy<=by+60){if(i<unlocked){snd.play('click');loadLvl(i);}return;}}
if(hitBtn(DESIGN_W/2,DESIGN_H-100,200,50,gx,gy)){snd.play('click');gs=ST.HOME;}
}else if(gs===ST.SET){
var sy=170,gap=80,tx=DESIGN_W/2+80;
if(gy>=sy-15&&gy<=sy+15&&gx>=tx-35&&gx<=tx+95){cfg.sndOn=!cfg.sndOn;snd.play('click');return;}
if(gy>=sy+gap-15&&gy<=sy+gap+15&&gx>=tx-35&&gx<=tx+95){cfg.musOn=!cfg.musOn;if(!cfg.musOn)snd.stopMus();snd.play('click');return;}
if(gy>=sy+gap*2-15&&gy<=sy+gap*2+15&&gx>=tx-35&&gx<=tx+95){cfg.vibOn=!cfg.vibOn;snd.play('click');return;}
var sbx=DESIGN_W/2-10,sw=180;
if(Math.abs(gy-sy-gap*3)<20&&gx>=sbx-10&&gx<=sbx+sw+10){sliderDrag='snd';cfg.sndVol=clp((gx-sbx)/sw,0,1);return;}
if(Math.abs(gy-sy-gap*4)<20&&gx>=sbx-10&&gx<=sbx+sw+10){sliderDrag='mus';cfg.musVol=clp((gx-sbx)/sw,0,1);snd.updMusVol();return;}
var qsx=DESIGN_W/2+10,bw=55,qg=10;
for(var i=0;i<3;i++){var bx=qsx+i*(bw+qg);if(gx>=bx&&gx<=bx+bw&&Math.abs(gy-sy-gap*5)<15){cfg.qual=i;snd.play('click');return;}}
var lsx=DESIGN_W/2-10,lbw=65,lg=8;
for(var i=0;i<3;i++){var bx=lsx+i*(lbw+lg);if(gx>=bx&&gx<=bx+lbw&&Math.abs(gy-sy-gap*6)<15){cfg.lang=i;snd.play('click');return;}}
if(hitBtn(DESIGN_W/2,DESIGN_H-100,200,50,gx,gy)){snd.play('click');gs=ST.HOME;}
}else if(gs===ST.ABOUT){
if(hitBtn(DESIGN_W/2,DESIGN_H-100,200,50,gx,gy)){snd.play('click');gs=ST.HOME;}
}else if(gs===ST.PLAY){
if(gx>=DESIGN_W-45&&gx<=DESIGN_W-5&&gy>=5&&gy<=45){gs=ST.PAUSE;snd.play('click');return;}
if(!ballLaunched&&ball&&dst(gx,gy,ball.x,ball.y)<80){isDrag=true;dragS={x:gx,y:gy};dragE={x:gx,y:gy};}
}else if(gs===ST.PAUSE){
if(hitBtn(DESIGN_W/2,460,260,55,gx,gy)){snd.play('click');gs=ST.PLAY;}
else if(hitBtn(DESIGN_W/2,540,260,55,gx,gy)){snd.play('click');loadLvl(curLvl);}
else if(hitBtn(DESIGN_W/2,620,260,55,gx,gy)){snd.play('click');snd.stopMus();gs=ST.HOME;}
}else if(gs===ST.OVER){
if(hitBtn(DESIGN_W/2,520,260,55,gx,gy)){snd.play('click');loadLvl(curLvl);}
else if(hitBtn(DESIGN_W/2,600,260,55,gx,gy)){snd.play('click');gs=ST.HOME;}
}else if(gs===ST.CLEAR){
if(curLvl<LEVELS.length-1&&hitBtn(DESIGN_W/2,550,260,55,gx,gy)){snd.play('click');loadLvl(curLvl+1);}
else if(hitBtn(DESIGN_W/2,630,260,55,gx,gy)){snd.play('click');gs=ST.LVL_SEL;}
else if(hitBtn(DESIGN_W/2,710,260,55,gx,gy)){snd.play('click');gs=ST.HOME;}
}else if(gs===ST.REVIVE){
if(adOn)return;
if(hitBtn(DESIGN_W/2,460,260,55,gx,gy)){snd.play('click');adOn=true;adT=0;}
else if(hitBtn(DESIGN_W/2,540,260,55,gx,gy)){snd.play('click');gs=ST.OVER;snd.stopMus();}
}
}

function onMove(e){
e.preventDefault();var rect=canvas.getBoundingClientRect();
var sx=e.clientX-rect.left,sy=e.clientY-rect.top,g=s2g(sx,sy),gx=g.x,gy=g.y;
if(isDrag)dragE={x:gx,y:gy};
if(sliderDrag==='snd'){var sbx=DESIGN_W/2-10,sw=180;cfg.sndVol=clp((gx-sbx)/sw,0,1);}
else if(sliderDrag==='mus'){var sbx=DESIGN_W/2-10,sw=180;cfg.musVol=clp((gx-sbx)/sw,0,1);snd.updMusVol();}
}

function onUp(e){
e.preventDefault();
if(isDrag&&ball){
var dx=dragS.x-dragE.x,dy=dragS.y-dragE.y;
var pwr=Math.min(Math.sqrt(dx*dx+dy*dy)*LAUNCH_M,MAX_PWR);
if(pwr>1){
var ang=Math.atan2(dy,dx);
ball.vx=Math.cos(ang)*pwr;ball.vy=Math.sin(ang)*pwr;
ball.active=true;ballLaunched=true;
snd.play('launch');vib(30);
}
isDrag=false;
}
sliderDrag=null;
}

canvas.addEventListener('pointerdown',onDown);
canvas.addEventListener('pointermove',onMove);
canvas.addEventListener('pointerup',onUp);
canvas.addEventListener('pointercancel',onUp);

function loop(ts){
if(!lastT)lastT=ts;
dt=Math.min((ts-lastT)/16.67,3);lastT=ts;frameN++;
fpsC++;fpsT+=ts-(lastT-dt*16.67);
if(fpsT>=1000){fps=fpsC;fpsC=0;fpsT=0;}
if(gs===ST.PLAY)updPhysics(dt);
if(gs===ST.REVIVE&&adOn){adT+=dt;if(adT>=180){adOn=false;adT=0;reviveBall();}}
switch(gs){
case ST.HOME:drwHome();break;
case ST.LVL_SEL:drwLvlSel();break;
case ST.PLAY:drwBg();drwGameArea();break;
case ST.SET:drwSettings();break;
case ST.ABOUT:drwAbout();break;
case ST.OVER:drwOver();break;
case ST.CLEAR:drwClear();break;
case ST.PAUSE:drwPause();break;
case ST.REVIVE:drwRevive();break;
}
if(cfg.qual>=2){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='10px monospace';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('FPS: '+fps,5,5);}
requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
