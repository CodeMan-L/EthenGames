<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ネオン数字マージ2048</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="home-screen" class="screen active">
            <div class="neon-title">
                <h1>ネオン数字マージ</h1>
                <h2>2048</h2>
            </div>
            <div class="score-display">
                <div class="score-item">
                    <span class="label">最高得点</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
            <div class="menu-buttons">
                <button id="btn-start" class="neon-btn primary">ゲーム開始</button>
                <button id="btn-levels" class="neon-btn">レベル選択</button>
                <button id="btn-settings" class="neon-btn">設定</button>
                <button id="btn-share" class="neon-btn share">TikTokで共有</button>
            </div>
            <div class="sound-toggle">
                <button id="btn-sound" class="icon-btn">
                    <span class="icon">🔊</span>
                </button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="game-info">
                    <div class="info-item">
                        <span class="label">レベル</span>
                        <span id="current-level" class="value">1</span>
                    </div>
                    <div class="info-item">
                        <span class="label">得点</span>
                        <span id="current-score" class="value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="label">目標</span>
                        <span id="target-number" class="value">256</span>
                    </div>
                </div>
                <div class="game-actions">
                    <button id="btn-undo" class="action-btn" title="取り消し">
                        <span>↩️</span>
                    </button>
                    <button id="btn-home" class="action-btn" title="ホーム">
                        <span>🏠</span>
                    </button>
                </div>
            </div>
            <div class="game-container">
                <div id="game-board" class="grid-4x4"></div>
            </div>
            <div class="game-footer">
                <p class="hint">スワイプして同じ数字をマージ</p>
            </div>
        </div>

        <div id="levels-screen" class="screen">
            <div class="screen-header">
                <button id="btn-back-levels" class="back-btn">← 戻る</button>
                <h2>レベル選択</h2>
            </div>
            <div id="levels-grid" class="levels-grid"></div>
        </div>

        <div id="settings-screen" class="screen">
            <div class="screen-header">
                <button id="btn-back-settings" class="back-btn">← 戻る</button>
                <h2>設定</h2>
            </div>
            <div class="settings-list">
                <div class="setting-item">
                    <span class="setting-label">効果音</span>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-sfx" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">BGM</span>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-bgm" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <button id="btn-reset" class="neon-btn danger">進捗リセット</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-box" class="modal-box">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <div id="modal-buttons" class="modal-buttons"></div>
        </div>
    </div>

    <div id="reward-modal" class="modal-overlay hidden">
        <div class="modal-box reward-box">
            <h3>🎁 宝箱ボーナス</h3>
            <p id="reward-text">広告を見て高級数字をゲット！</p>
            <div class="reward-preview" id="reward-preview"></div>
            <div class="modal-buttons">
                <button id="btn-watch-ad" class="neon-btn primary">広告を見る</button>
                <button id="btn-close-reward" class="neon-btn">閉じる</button>
            </div>
        </div>
    </div>

    <div id="ad-placeholder" class="ad-placeholder hidden">
        <div class="ad-content">
            <div class="ad-spinner"></div>
            <p>広告読み込み中...</p>
            <p id="ad-timer">3</p>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="levels.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const game = new Game2048();
            game.init();
        });
    </script>
</body>
</html>
